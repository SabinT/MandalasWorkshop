<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mandalas Workshop</title>
    <style>
        /* Center the canvas in the browser window */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        canvas {
            display: block;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
        }

        /* ── Console error overlay ─────────────────────────── */
        #error-panel {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-height: 40vh;
            overflow-y: auto;
            background: #1e1e1e;
            color: #f8f8f8;
            font-family: Consolas, "Courier New", monospace;
            font-size: 13px;
            z-index: 9999;
            border-top: 3px solid #e74c3c;
        }
        #error-panel-header {
            position: sticky;
            top: 0;
            background: #2d2d2d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            cursor: pointer;
            user-select: none;
        }
        #error-panel-header span {
            color: #e74c3c;
            font-weight: bold;
        }
        #error-panel-header button {
            background: none;
            border: 1px solid #888;
            color: #ccc;
            border-radius: 4px;
            padding: 2px 10px;
            cursor: pointer;
            font-size: 12px;
        }
        #error-panel-header button:hover { background: #444; }
        .error-entry {
            border-bottom: 1px solid #333;
            padding: 8px 12px;
            cursor: pointer;
        }
        .error-entry:hover { background: #2a2a2a; }
        .error-summary {
            color: #e74c3c;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .error-detail {
            display: none;
            margin-top: 6px;
            padding: 6px 8px;
            background: #161616;
            border-radius: 4px;
            white-space: pre-wrap;
            word-break: break-word;
            color: #ccc;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
        .error-entry.open .error-detail { display: block; }
    </style>
</head>
<body>
    <!-- On-page error console (hidden until an error occurs) -->
    <div id="error-panel">
        <div id="error-panel-header">
            <span id="error-count">0 errors</span>
            <span>
                <button id="error-hide-btn">Hide</button>
                <button id="error-clear-btn">Clear</button>
            </span>
        </div>
        <div id="error-list"></div>
    </div>

    <script>
    // ── Capture console errors and display them on-page ───────
    (function () {
        var panel    = document.getElementById("error-panel");
        var list     = document.getElementById("error-list");
        var counter  = document.getElementById("error-count");
        var clearBtn = document.getElementById("error-clear-btn");
        var hideBtn  = document.getElementById("error-hide-btn");
        var MAX_VISIBLE = 5;
        var count    = 0;

        function escapeHtml(str) {
            var d = document.createElement("div");
            d.appendChild(document.createTextNode(str));
            return d.innerHTML;
        }

        /** Trim visible entries so only the last MAX_VISIBLE are shown. */
        function trimEntries() {
            while (list.children.length > MAX_VISIBLE) {
                list.removeChild(list.firstChild);
            }
        }

        /** Check if a filename path ends with sketch.js */
        function isSketchFile(filename) {
            return filename && /sketch\.js$/i.test(filename);
        }

        function addError(summary, detail) {
            count++;
            panel.style.display = "block";
            counter.textContent = count + (count === 1 ? " error" : " errors");

            var entry = document.createElement("div");
            entry.className = "error-entry";
            entry.innerHTML =
                '<div class="error-summary">' + escapeHtml(summary) + '</div>' +
                '<div class="error-detail">'  + escapeHtml(detail)  + '</div>';
            entry.addEventListener("click", function () {
                entry.classList.toggle("open");
            });
            list.appendChild(entry);
            trimEntries();
            panel.scrollTop = panel.scrollHeight;
        }

        // Catch runtime errors
        window.addEventListener("error", function (e) {
            var msg   = e.message || "Unknown error";
            var where = (e.filename || "") + (e.lineno ? ":" + e.lineno : "")
                        + (e.colno ? ":" + e.colno : "");
            var stack = (e.error && e.error.stack) ? e.error.stack : "";
            // Append line info to summary when the error is in sketch.js
            if (isSketchFile(e.filename)) {
                msg += "  (sketch.js line " + e.lineno + (e.colno ? ":" + e.colno : "") + ")";
            }
            addError(msg, where + "\n" + stack);
        });

        // Catch unhandled promise rejections
        window.addEventListener("unhandledrejection", function (e) {
            var reason = e.reason;
            var msg    = (reason && reason.message) ? reason.message : String(reason);
            var stack  = (reason && reason.stack)    ? reason.stack   : "";
            addError("Unhandled Promise: " + msg, stack);
        });

        // Intercept console.error
        var origError = console.error;
        console.error = function () {
            origError.apply(console, arguments);
            var parts = Array.prototype.map.call(arguments, function (a) {
                return typeof a === "object" ? JSON.stringify(a, null, 2) : String(a);
            });
            addError(parts[0] || "console.error", parts.join("\n"));
        };

        hideBtn.addEventListener("click", function (e) {
            e.stopPropagation();
            panel.style.display = "none";
        });

        clearBtn.addEventListener("click", function (e) {
            e.stopPropagation();
            count = 0;
            list.innerHTML = "";
            panel.style.display = "none";
        });
    })();
    </script>

    <!-- p5.js from CDN -->
    <script src="library/p5.min-1.11.11.js"></script>

    <!-- Utility libraries (order matters: math first, then mandala) -->
    <script src="library/math.js"></script>
    <script src="library/mandala.js"></script>

    <!-- Your sketch -->
    <script src="sketch.js"></script>
</body>
</html>
