<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mandalas Workshop</title>
    <style>
        /* Center the canvas in the browser window */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        canvas {
            display: block;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>
<body>
    <!-- p5.js from CDN -->
    <script src="library/p5.min-1.11.11.js"></script>

    <!-- Utility libraries (order matters: math first, then mandala) -->
    <script src="library/math.js"></script>
    <script src="library/mandala.js"></script>

    <!-- Your sketch -->
    <script src="sketch.js"></script>
</body>
</html>
